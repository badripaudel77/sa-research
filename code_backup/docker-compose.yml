services:
  consul-server-1:
    image: hashicorp/consul:latest
    container_name: consul-server-1
    command: "agent -server -bootstrap-expect=3 -client=0.0.0.0 -ui -retry-join=consul-server-2 -retry-join=consul-server-3"
    ports:
      - "8500:8500" # UI and HTTP API
      - "8600:8600/udp" # DNS
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - consul-net

  consul-server-2:
    image: hashicorp/consul:latest
    container_name: consul-server-2
    command: "agent -server -client=0.0.0.0 -ui -retry-join=consul-server-1 -retry-join=consul-server-3"
    ports:
      - "8501:8500" # UI and HTTP API (different host port to avoid conflict)
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - consul-net

  consul-server-3:
    image: hashicorp/consul:latest
    container_name: consul-server-3
    command: "agent -server -client=0.0.0.0 -ui -retry-join=consul-server-1 -retry-join=consul-server-2"
    ports:
      - "8502:8500" # UI and HTTP API (different host port to avoid conflict)
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - consul-net

  stock-service:
    build:
      context: ./stock-service
    container_name: stock-service
    ports:
      - "8900:8900"
    environment:
      SPRING_CLOUD_CONSUL_HOST: consul-server-1
      SPRING_CLOUD_CONSUL_PORT: 8500
    depends_on:
      consul-server-1:
        condition: service_healthy
      consul-server-2:
        condition: service_healthy
      consul-server-3:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - consul-net

  product-service:
    build:
      context: ./product-service
    container_name: product-service
    ports:
      - "8902:8902"
    environment:
      SPRING_CLOUD_CONSUL_HOST: consul-server-1
      SPRING_CLOUD_CONSUL_PORT: 8500
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/sa_database
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      consul-server-1:
        condition: service_healthy
      consul-server-2:
        condition: service_healthy
      consul-server-3:
        condition: service_healthy
      stock-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - consul-net

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_CLOUD_CONSUL_HOST: consul-server-1
      SPRING_CLOUD_CONSUL_PORT: 8500
    depends_on:
      consul-server-1:
        condition: service_healthy
      consul-server-2:
        condition: service_healthy
      consul-server-3:
        condition: service_healthy
      product-service:
        condition: service_started
      stock-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - consul-net

networks:
  consul-net:
    driver: bridge